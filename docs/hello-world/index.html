    body {
      background-color: white;
      margin: 0px;
      overflow: hidden;
      font-variant-ligatures: normal;
      font-family: 'JetBrains Mono';
      font-size: min(0.67vw,0.8rem);
      font-weight:400;

    #reticle {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      line-height: 20px;
      margin: -10px 0 0 -10px;
      z-index: 99;
      color: white;
      text-shadow: 1px 1px 0px black;
      text-align: center;
    }

    .debug-container {
      padding:0.25vw;
      position: fixed;
      display:flex;
      top: 2vw;
      left: 2vw;
      width: 46vw;
      height: 1.6vw;
      z-index: 99;
    }
    #debug-seed{
      padding:0.25vw;
      background-color:#6f6a;
      border: .2vw solid #0f0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
      width: 90px;
      height: 20px;
      overflow:hidden;
    }
    
    #debug-coords{
      padding:0.25vw;
      background-color:#ff0a;
      border: .2vw solid #fc0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
      width: 320px;
      height: 20px;
      overflow:hidden;
    }

    #debug-vel{
      padding:0.25vw;
      background-color:#ff0a;
      border: .2vw solid #fc0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
      width: 320px;
      height: 20px;
      overflow:hidden;
    }
    
    #debug-speed{
      padding:0.25vw;
      background-color:#3fca;
      border: .2vw solid #0fc;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
      width: 150px;
      height: 20px;
      overflow:hidden;
    }

    .hotbar-container {
      padding:0.25vw;
      position: fixed;
      grid-template-colums:repeat(10,1fr);
      display:flex;
      top: calc(97.5%-80px);
      left: calc(50%-400px);
      width: 800px;
      height: 80px;
      z-index: 99;
      align-items:center;
    }
    .hotbar-container > div{
      width:80px;
      height:80px;
      padding:0.25vw;
      background-color:#f25058aa;
      backdrop-filter:blur(6px);
      text-align:right;
      vertical-align:bottom;
      color:#eeeeee;
      border:.2vw solid #ee2f45;
      border-radius:.5vw;
    }
