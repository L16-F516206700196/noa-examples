<!DOCTYPE HTML>
<html lang="en">

<head>
  <title>noa-examples: hello-world</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <style type="text/css">
    body {
      background-color: white;
      margin: 0px;
      overflow: hidden;
    }

    #reticle {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      line-height: 20px;
      margin: -10px 0 0 -10px;
      z-index: 99;
      color: white;
      text-shadow: 1px 1px 0px black;
      text-align: center;
    }

    .debug-container {
      position: fixed;
      display:flex;
      top: 2vw;
      left: 2vw;
      width: 6vw;
      height: 12vw;
      
    }
    #debug-seed{
      background-color:#6f6c;
      border: 2px solid #0f0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
    }
    
    #debug-coords{
      background-color:#ff0c;
      border: 2px solid #fc0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
    }

    #debug-velocity{
      background-color:#ff0c;
      border: 2px solid #fc0;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
    }
    
    #debug-speed{
      background-color:#3fcc;
      border: 2px solid #0fc;
      border-radius:.5vw;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index: 99;
    }
  </style>
  <script type="module" crossorigin src="../assets/helloWorld.3318bd85.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/babylon.39bd9ef3.js">
  <link rel="modulepreload" crossorigin href="../assets/index.2b3d1184.js">
</head>

<body>
  <div id="reticle">+</div>

  <div class="debug-container">
    <div id="debug-seed">Seed: Loading...</div>
    <div id="debug-coords">Coords (x/y/z): Loading...</div>
    <div id="debug-velocity">Velocity (x/y/z): Loading...</div>
    <div id="debug-speed">Speed: Loading...</div>
  </div>
  
</body>

</html>
